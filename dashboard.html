<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MedAI | Clinical Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #eef2f3;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .nav {
            background: #1a5f7a;
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid #1a5f7a;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9em;
            color: #888;
            text-transform: uppercase;
        }

        .card div {
            font-size: 2.5em;
            font-weight: 700;
            color: #1a5f7a;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .activity-feed {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .log-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .confidential {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>

    <div class="nav">
        <h1>🏥 MedAI Clinical Command Center</h1>
        <p>Operational status: <b>System Active</b> | Intelligent document routing in progress.</p>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>Total Documents Processed</h3>
            <div id="total">0</div>
        </div>
        <div class="card" style="border-left-color: #e74c3c;">
            <h3>Confidential Alerts</h3>
            <div id="conf" style="color:#e74c3c;">0</div>
        </div>
        <div class="card" style="border-left-color: #22a699;">
            <h3>Active Departments</h3>
            <div id="depts">0</div>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-box">
            <h3 style="margin-top:0;">Departmental Routing Efficiency</h3>
            <canvas id="deptChart"></canvas>
        </div>
        <div class="activity-feed" id="feed">
            <h3>Recent Document Logs</h3>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzXPImElRSKuwfJf8VMD_76N_O7DqO7kDOtcAg101NdEpbzgTm4GlqHRE_FDey5ple1/exec";

        async function init() {
            const res = await fetch(API_URL);
            const data = await res.json();

            // Stats
            document.getElementById('total').innerText = data.length;
            document.getElementById('conf').innerText = data.filter(r => r.Sensitivity == 'confidential').length;
            document.getElementById('depts').innerText = new Set(data.map(r => r.Department)).size;

            // Feed
            const feed = document.getElementById('feed');
            data.reverse().forEach(r => {
                feed.innerHTML += `<div class="log-item">
                    <b>Doc:</b> ${r['Document ID'].substring(0, 8)}... <br>
                    <b>Dept:</b> ${r.Department} 
                    <span class="tag ${r.Sensitivity == 'confidential' ? 'confidential' : ''}">${r.Sensitivity}</span>
                </div>`;
            });

            // Chart
            const deptData = data.reduce((acc, r) => { acc[r.Department] = (acc[r.Department] || 0) + 1; return acc; }, {});
            new Chart(document.getElementById('deptChart'), {
                type: 'bar',
                data: { labels: Object.keys(deptData), datasets: [{ label: 'Documents', data: Object.values(deptData), backgroundColor: '#1a5f7a' }] }
            });
        }
        init();
    </script>
</body>

</html>
