<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MedAI | Clinical Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #eef2f3;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .nav {
            background: #1a5f7a;
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid #1a5f7a;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9em;
            color: #888;
            text-transform: uppercase;
        }

        .card div {
            font-size: 2.5em;
            font-weight: 700;
            color: #1a5f7a;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .activity-feed {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .log-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .confidential {
            background: #fee2e2;
            color: #991b1b;
        }

        /* --- Semantic Search --- */
        .search-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid #22a699;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        .search-box h3 {
            margin: 0 0 15px 0;
            font-size: 0.9em;
            color: #888;
            text-transform: uppercase;
        }

        .search-controls {
            display: flex;
            gap: 10px;
        }

        #searchInput {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #d6dde0;
            border-radius: 8px;
            font-family: 'Roboto', sans-serif;
            font-size: 1em;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        #searchInput:focus {
            border-color: #1a5f7a;
        }

        #searchBtn {
            background: #1a5f7a;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 28px;
            font-family: 'Roboto', sans-serif;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        #searchBtn:hover {
            background: #14506a;
        }

        #searchBtn:disabled {
            background: #9bb3bf;
            cursor: not-allowed;
        }

        .search-results {
            margin-top: 20px;
        }

        .result-item {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 16px 18px;
            margin-bottom: 14px;
            background: #fafbfc;
        }

        .result-text {
            font-size: 0.95em;
            line-height: 1.5;
            margin-bottom: 12px;
            color: #333;
        }

        .result-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .confidence {
            font-size: 0.85em;
            font-weight: 700;
            color: #1a5f7a;
            margin-right: auto;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 700;
        }

        .badge-dept {
            background: #e0f2f1;
            color: #00695c;
        }

        .badge-routing {
            background: #e8eef2;
            color: #1a5f7a;
        }

        .badge-internal {
            background: #e6f4ea;
            color: #137333;
        }

        .badge-confidential {
            background: #fee2e2;
            color: #991b1b;
        }

        .search-status {
            font-size: 0.9em;
            color: #888;
            padding: 8px 0;
        }

        .search-status.error {
            color: #c0392b;
        }
    </style>
</head>

<body>

    <div class="nav">
        <h1>🏥 MedAI Clinical Command Center</h1>
        <p>Operational status: <b>System Active</b> | Intelligent document routing in progress.</p>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>Total Documents Processed</h3>
            <div id="total">0</div>
        </div>
        <div class="card" style="border-left-color: #e74c3c;">
            <h3>Confidential Alerts</h3>
            <div id="conf" style="color:#e74c3c;">0</div>
        </div>
        <div class="card" style="border-left-color: #22a699;">
            <h3>Active Departments</h3>
            <div id="depts">0</div>
        </div>
    </div>

    <div class="search-box">
        <h3>Semantic Medical Search</h3>
        <div class="search-controls">
            <input type="text" id="searchInput"
                placeholder="Search clinical context (e.g., patient with severe migraines)..." />
            <button id="searchBtn" onclick="runSearch()">Search</button>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>

    <div class="main-content">
        <div class="chart-box">
            <h3 style="margin-top:0;">Departmental Routing Efficiency</h3>
            <canvas id="deptChart"></canvas>
        </div>
        <div class="activity-feed" id="feed">
            <h3>Recent Document Logs</h3>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzXPImElRSKuwfJf8VMD_76N_O7DqO7kDOtcAg101NdEpbzgTm4GlqHRE_FDey5ple1/exec";
        const SEARCH_API_URL = "http://localhost:8000/search";

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        async function runSearch() {
            const input = document.getElementById('searchInput');
            const btn = document.getElementById('searchBtn');
            const resultsEl = document.getElementById('searchResults');
            const query = input.value.trim();

            if (!query) {
                resultsEl.innerHTML = `<div class="search-status">Please enter a search query.</div>`;
                return;
            }

            // Loading state
            btn.disabled = true;
            const originalLabel = btn.innerText;
            btn.innerText = "Searching...";
            resultsEl.innerHTML = `<div class="search-status">Searching clinical records...</div>`;

            try {
                const res = await fetch(SEARCH_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: query, top_k: 3 })
                });

                if (!res.ok) throw new Error(`Server responded with ${res.status}`);

                const data = await res.json();
                const results = data.results || [];

                if (results.length === 0) {
                    resultsEl.innerHTML = `<div class="search-status">No matching documents found.</div>`;
                    return;
                }

                resultsEl.innerHTML = results.map(r => {
                    const confidence = Math.round((r.score || 0) * 100);
                    const sensitivity = (r.sensitivity || '').toLowerCase();
                    const sensClass = sensitivity === 'confidential' ? 'badge-confidential' : 'badge-internal';
                    const badges = [];
                    if (r.department) badges.push(`<span class="badge badge-dept">${escapeHtml(r.department)}</span>`);
                    if (r.sensitivity) badges.push(`<span class="badge ${sensClass}">${escapeHtml(r.sensitivity)}</span>`);
                    if (r.routing_tag) badges.push(`<span class="badge badge-routing">${escapeHtml(r.routing_tag)}</span>`);

                    return `<div class="result-item">
                        <div class="result-text">${escapeHtml(r.text || '(no text available)')}</div>
                        <div class="result-meta">
                            <span class="confidence">Match Confidence: ${confidence}%</span>
                            ${badges.join('')}
                        </div>
                    </div>`;
                }).join('');

            } catch (err) {
                resultsEl.innerHTML = `<div class="search-status error">
                    Could not reach the search service. Make sure the FastAPI server is running on
                    <b>http://localhost:8000</b>. (${escapeHtml(err.message)})
                </div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = originalLabel;
            }
        }

        // Trigger search on Enter key.
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') runSearch();
        });

        async function init() {
            const res = await fetch(API_URL);
            const data = await res.json();

            // Stats
            document.getElementById('total').innerText = data.length;
            document.getElementById('conf').innerText = data.filter(r => r.Sensitivity == 'confidential').length;
            document.getElementById('depts').innerText = new Set(data.map(r => r.Department)).size;

            // Feed
            const feed = document.getElementById('feed');
            data.reverse().forEach(r => {
                feed.innerHTML += `<div class="log-item">
                    <b>Doc:</b> ${r['Document ID'].substring(0, 8)}... <br>
                    <b>Dept:</b> ${r.Department} 
                    <span class="tag ${r.Sensitivity == 'confidential' ? 'confidential' : ''}">${r.Sensitivity}</span>
                </div>`;
            });

            // Chart
            const deptData = data.reduce((acc, r) => { acc[r.Department] = (acc[r.Department] || 0) + 1; return acc; }, {});
            new Chart(document.getElementById('deptChart'), {
                type: 'bar',
                data: { labels: Object.keys(deptData), datasets: [{ label: 'Documents', data: Object.values(deptData), backgroundColor: '#1a5f7a' }] }
            });
        }
        init();
    </script>
</body>

</html>
